<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Viktorioussssss’s Twitter Archive</title>
		<meta name="description" content="A read-only indieweb self-hosted archive of Viktorioussssss’s tweets." />

		<link rel="profile" href="https://microformats.org/profile/hatom">
		<link rel="stylesheet" href="/assets/style.css">
		<script src="/assets/script.js" type="module"></script>
		<script src="/assets/is-land.js" type="module"></script>

		<!-- PAGEFIND ENGINE STYLES AND SCRIPTS -->
		<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
		<script src="/pagefind/pagefind-ui.js" type="module"></script>

		<!-- EMBEDDED TWITTER DARK THEME PROPERTIES -->
		<style>
			body { background-color: #15202b !important; color: #f7f9fa !important; }
			.tweet { background: #192734 !important; border: 1px solid #38444d !important; color: #f7f9fa !important; margin: 0 0 3.5rem !important; padding: 1.5rem !important; border-radius: 0.5rem !important; }
			.tweet-text { color: #f7f9fa !important; }
			.tweets-title a, .tweet-username, .tweets-nav a { color: #1d9bf0 !important; }
			.tweet-metadata, .tweet-pretext { color: #8899a6 !important; }
			input, button { background: #192734 !important; color: #fff !important; border: 1px solid #38444d !important; }
			#search { --pagefind-ui-primary: #1d9bf0; --pagefind-ui-text: #f7f9fa; --pagefind-ui-background: #192734; --pagefind-ui-border: #38444d; margin-bottom: 2rem; }
		</style>

		
	</head>
	<body>
		<header>
			<h1 class="tweets-title"><a href="/"><img src="https://avatars.githubusercontent.com/u/209388864?v=4" width="52" height="52" alt="Viktorioussssss’s avatar" class="tweet-avatar">Viktorioussssss’s Twitter Archive</a></h1>
			<ul class="tweets-nav">
				<li><a rel="home" href="https://github.com/Viktorious-x">← GitHub</a></li>
			</ul>
			
		</header>
		<main>
			
		<h2 class="tweets-primary-count">
			Tweet not found.
		</h2>

		</main>
		<footer>
			<p>An open source project from <a href="https://github.com/tweetback">tweetback</a>.</p>
		</footer>

		<!-- PAGEFIND RUNTIME INITIALIZATION SCRIPT -->
		<script>
			window.addEventListener('DOMContentLoaded', (event) => {
				new PagefindUI({ element: "#search", showSubResults: true, resetFilters: false });
			});
		</script>
	</body>
</html>
